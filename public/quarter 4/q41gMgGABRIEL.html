<!DOCTYPE html>
<html>
<head>
<title>Cari's Curate Your Cinema</title>
<style>
    body {
        font-family: Arial;
    }

    .star {
        font-size: 25px;
        cursor: pointer;
        color: gray;
    }

    .star-selected {
        color: goldenrod;
    }

    .movie {
        margin-top: 10px;
    }

    form {
        background: #f4f4f4;
        padding: 20px;
        width: 300px;
        border-radius: 10px;
    }

    button {
        background: #007bff;
        color: white;
        border: none;
        padding: 10px;
    }

</style>
<script>
document.addEventListener("DOMContentLoaded", function() {
    let stars = document.querySelectorAll(".star");
    let ratingInput = document.getElementById("rating");

    stars.forEach(star => {
        star.addEventListener("click", function() {
            let ratingValue = this.getAttribute("data-value");
            ratingInput.value = ratingValue;

            stars.forEach(s => s.classList.remove("star-selected"));
            for (let i = 0; i < ratingValue; i++) {
                stars[i].classList.add("star-selected");
            }
        });
    });

    document.getElementById("moviesForm").addEventListener("submit", function(event) {
        event.preventDefault();

        let title = document.getElementById("movieTitle").value;
        let year = document.getElementById("year").value;
        let genre = document.getElementById("genre").value;
        let rating = document.getElementById("rating").value;
        let movie = {
            title: title,
            year: year,
            genre: genre,
            rating: rating
        };

        saveMovie(movie);
        displayMovies();
        this.reset();
        stars.forEach(s => s.classList.remove("star-selected"));
    });

    function saveMovie(movie) {
        let movies = JSON.parse(localStorage.getItem("movies")) || [];
        movies.push(movie);
        localStorage.setItem("movies", JSON.stringify(movies));
    }

    function displayMovies() {
        let movies = JSON.parse(localStorage.getItem("movies")) || [];
        let movieList = document.getElementById("movieList");
        movieList.innerHTML = "";

        movies.forEach(movie => {
            let starsDisplay = "★".repeat(movie.rating) + "☆".repeat(5 - movie.rating);
            movieList.innerHTML += `
            <div class="movie">
                <b>${movie.title}</b> (${movie.genre})
                <br>
                <span style="color: goldenrod;">${starsDisplay}</span>
            </div>
            `;
        });
    }

    displayMovies();
});
</script>
<body>
    <h1>Cari's Curate Your Cinema</h1>
    <h2>Add a Movie</h2>

    <form id="moviesForm">
        <label>Movie Title:</label>
        <input type="text" id="movieTitle" required/>
        <br><br>

        <label>Year:</label>
        <input type="number" id="year"/>
        <br><br>

        <label>Genre:</label>
        <select id="genre">
            <option value="">Select genre</option>
            <option value="Action">Action</option>
            <option value="Comedy">Comedy</option>
            <option value="Drama">Drama</option>
            <option value="Horror">Horror</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Romance">Romance</option>
        </select>
        <br><br>

        <label>Rating:</label>
        <span class="star" data-value="1">★</span>
        <span class="star" data-value="2">★</span>
        <span class="star" data-value="3">★</span>
        <span class="star" data-value="4">★</span>
        <span class="star" data-value="5">★</span>
        <input type="hidden" id="rating" required/>
        <br><br>

        <button type="submit">Add Movie</button>
    </form>

    <hr>
    <h3>Movie List</h3>
    <div id="movieList"></div>

</body>
</html>
